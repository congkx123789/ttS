services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: novel-backend
    restart: always
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - DB_MODE=advanced
    volumes:
      - ./merged_books_advanced.db:/app/merged_books_advanced.db:ro
      - ./merged_books_fast.db:/app/merged_books_fast.db:ro
      - ./merged_books_hanviet.db:/app/merged_books_hanviet.db:ro
      - ./users_data.db:/app/users_data.db
      - ./quick_translator:/app/quick_translator:ro
    ports:
      - "5050:5050"
      - "5051:5050"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5050/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - ./nginx/data:/data
      - ./nginx/letsencrypt:/etc/letsencrypt
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  email-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: email-worker
    restart: always
    env_file:
      - .env
    volumes:
      - ./users_data.db:/app/users_data.db
    command: ["python", "email_service.py"]
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
